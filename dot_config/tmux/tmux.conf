####################################
# Plugins
####################################
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g prefix C-s

# Index 1 for windows
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 100000000
set -g renumber-windows on
setw -g mode-keys vi
setw -g mouse on
set -g default-terminal "tmux-256color"

set-option -g default-shell /usr/bin/zsh
# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
# Catpuccin theme
set -g @plugin 'catppuccin/tmux'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"

# Catpuccin config
set -g @ctp_bg "#24273a"
set -g @ctp_surface_1 "#494d64"
set -g @ctp_fg "#cad3f5"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"
set -gq "@catppuccin_date_time_text" " %B-%d %H:%M"
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g status-left ''
set -g status-position top
set -g status-style "bg=default"
set -gF window-status-format "#[bg=#{@ctp_surface_1},fg=#{@ctp_fg}] ##I ##W "
set -gF window-status-current-format "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] ##I ##W "

# Bindings
unbind r
bind . source ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"
bind X kill-server
bind -r : command-prompt
bind -r < previous-window
bind -r H previous-window
bind -r J switch-client -n
bind -r K switch-client -p
bind -r L next-window
bind -r N command-prompt "new -s %%"
bind -r Z set-window-option synchronize-panes off
bind -r a choose-tree -s -O name
bind -r f resize-pane -Z
bind -r h if -F '#{pane_at_left}' '' 'selectp -L'
bind -r i set-option -gs key-table root
bind -r j if -F '#{pane_at_bottom}' '' 'selectp -D'
bind -r k if -F '#{pane_at_top}' '' 'selectp -U'
bind -r l if -F '#{pane_at_right}' '' 'selectp -R'
bind -r m select-layout -E
bind -r n new-window
bind -r s split-window -v -c "#{pane_current_path}"
bind -r v split-window -h -c "#{pane_current_path}"
bind -r w kill-pane
bind -r y copy-mode
bind -r z set-window-option synchronize-panes on
bind -r R command-prompt "rename-session %%"
bind -r r command-prompt "rename-window %%"
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
bind -r S-Left swap-window -t -1 \; select-window -t -1
bind -r S-Right swap-window -t +1 \; select-window -t +1
