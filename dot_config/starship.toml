add_newline = true
command_timeout = 200
##format = '''[$username$hostname \[$directory\] \[$time\] ]($style)
#$character'''
format = '''[$username$hostname $directory $git_branch$git_status]($style)
$character'''


[character]
error_symbol = "[\\$](bold red)"
success_symbol = "[\\$](bold cyan)"

[directory]
truncation_length = 10
truncate_to_repo = false
read_only_style = "red"
repo_root_style = "bold purple"
before_repo_root_style = "bold cyan"
read_only = "󰌾"
format = '[$read_only]($read_only_style) [$path]($style) [$read_only]($read_only_style)'
repo_root_format = '[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'
#repo_root_format = '[$home$before_root_path$repo_root$path$read_only]($read_only_style)'

[username]
disabled = false
show_always = true
format = '[$user]($style)'

[hostname]
ssh_only = false
format = '@[$hostname]($style)'

[time]
disabled = false
format = '[$time]($style) '
time_format = '%T'
utc_time_offset = '-3'

[git_branch]
format = "[  $branch]($style)"
style = "purple"

[git_commit]
tag_symbol = '  '

[git_status]
format     = '[$up_to_date$conflicted]($style)[$deleted](red)[$renamed$modified](yellow)[$staged](green)[$untracked](blue)'
style      = "cyan"
ahead      = " ⇡${count}"
diverged   = " ⇕⇡${ahead_count}⇣${behind_count} "
behind     = " ⇣${count}"
conflicted = " "
up_to_date = " "
untracked  = " ${count}?"
modified   = " ${count}M"
stashed    = " ${count}"
staged     = " ${count}+"
renamed    = " ${count}R"
deleted    = " ${count}D"
