$terminal = kitty
$browser = firefox
$mainMod = SUPER
$secondMod = CTRL_SHIFT_ALT_SUPER

# Main bindings
bindd = $mainMod, F, Fullscreen, fullscreen
bindd = $mainMod, W, Close Active Window, killactive
bindd = $mainMod SHIFT, R, Reload Waybar, exec, pkill waybar; hyprctl dispatch exec waybar
binddo = $mainMod SHIFT CONTROL, Q, Exit Hyprland, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod SHIFT CONTROL, L, Lock screen, exec, hyprlock --grace 10

# Tiling
unbind = $mainMod, J
unbind = $mainMod, K
bindd = $mainMod, H, Move focus left, movefocus, l
bindd = $mainMod, L, Move focus right, movefocus, r
bindd = $mainMod, K, Move focus up, movefocus, u
bindd = $mainMod, J, Move focus down, movefocus, d
bindd = $mainMod, LEFT, Move focus left, movefocus, l
bindd = $mainMod, RIGHT, Move focus right, movefocus, r
bindd = $mainMod, UP, Move focus up, movefocus, u
bindd = $mainMod, DOWN, Move focus down, movefocus, d
bindd = $mainMod, TAB, Cycle focus, cyclenext
bindd = $mainMod CTRL, F, Tiled full screen, fullscreenstate, 1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod CONTROL, 1, workspace, 5
bind = $mainMod CONTROL, 2, workspace, 6
bind = $mainMod CONTROL, 3, workspace, 7
bind = $mainMod CONTROL, 4, workspace, 8
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Also use secondMod
bind = $secondMod, 1, workspace, 1
bind = $secondMod, 2, workspace, 2
bind = $secondMod, 3, workspace, 3
bind = $secondMod, 4, workspace, 4
bind = $secondMod, 5, workspace, 5
bind = $secondMod, 6, workspace, 6
bind = $secondMod, 7, workspace, 7
bind = $secondMod, 8, workspace, 8
bind = $secondMod, 9, workspace, 9
binde = $mainMod CTRL, Left, resizeactive, -20 0
binde = $mainMod CTRL, Right, resizeactive, 20 0
binde = $mainMod CTRL, Up, resizeactive, 0 -20
binde = $mainMod CTRL, Down, resizeactive, 0 20
binde = $mainMod CTRL, H, resizeactive, -20 0
binde = $mainMod CTRL, L, resizeactive, 20 0
binde = $mainMod CTRL, K, resizeactive, 0 -20
binde = $mainMod CTRL, J, resizeactive, 0 20

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindd = $mainMod SHIFT, M, Toggle audio output, exec, toggle-audio.sh

bindd = $mainMod, BACKSPACE, Toggle transparency on current window, setprop, active opaque toggle
bindd = $mainMod, T, Toggle bouyancy, togglefloating
bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER SHIFT, N, exec, swaync-client -C

# Apps
bindd = $secondMod, E, Focus-or-launch Telegram, exec, fol-telegram
bindd = $secondMod, A, Focus-or-launch Browser, exec, fol-zen
bindd = $secondMod, T, Focus-or-launch Terminal, exec, fol-kitty
# bindd = $secondMod, S, Focus-or-launch Steam, exec, fol-steam
bindd = $secondMod, D, Focus-or-launch Vesktop, exec, fol-vesktop
bindd = $secondMod, W, Focus-or-launch WhatsApp, exec, fol-whatsapp
bindd = $secondMod, M, Focus-or-launch Spotify, exec, fol-spotify
bindd = $mainMod, RETURN, Terminal, exec, $terminal
bindd = $mainMod SHIFT, RETURN, Floating terminal, exec, [float; size 700 400] kitty
bindd = $mainMod, SPACE, Rofi, exec, rofi -show drun
bindd = $mainMod SHIFT, D, Docker, exec, $terminal -e lazydocker
bindd = $mainMod SHIFT, T, Activity, exec, $terminal -e btop
bindd = $mainMod SHIFT, O, Obsidian, exec, obsidian

# Tools
bindd = $mainMod SHIFT, A, Reload AGS, exec, ~/dotfiles/ags/reload.sh
bindd = $mainMod SHIFT, S, Take screenshot, exec, hyprshot -m region --output-folder ~/drives/hdd/media/images/hyprshot
bindd = $mainMod CONTROL, SPACE, Change wallpaper, exec, hyprctl dispatch exec pick-random-wallpaper
bind = $mainMod, R, exec, gpu-screen-recorder -w DP-1 -f 30 -a default_output -o ~/drives/hdd/media/videos/screenrecord/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording Started"
bind = $mainMod CONTROL, R, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"

# Zoom
bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

