# Extra autostart processes
# exec-once = uwsm app -- my-service
# exec-once = clipse -listen
# exec-once = ghostty
# exec-once = systemctl --user start elephant
exec-once = waybar
exec-once = awww-daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 1 && hyprlock
# LocalSend en segundo plano (oculto al tray), para recibir desde el iPhone sin abrir la GUI
exec-once = sleep 2 && localsend --hidden
# exec-once = ~/.local/bin/start-quickshell.sh

