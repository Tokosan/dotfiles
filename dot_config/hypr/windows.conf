#   workspace = 3
#   tile = off
# }
# Vesktop on 6
windowrule {
  name=vesktop-on-workspace-6
  match:initial_class = vesktop
  workspace = 6
  opacity = 1 1
}

windowrule {
  name=spotify-on-workspace-8
  match:initial_class = chrome-spotify.com__-Default
  workspace = 8
}

# LocalSend: ventana flotante (no reserva espacio en el tiling al abrir desde el tray)
windowrule {
  name=localsend-floating
  match:initial_class = localsend
  float = on
  center = on
  size = 950 984
}

# Transparency rules
windowrule = match:class firefox, opacity 1.0 1.0
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell
layerrule = no_anim 1, match:class ^(rofi)$
