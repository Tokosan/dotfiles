# See https://wiki.hyprland.org/Configuring/Window-Rules/
# Whatsapp and Telegram always go on workspace 3, and have a border size of 10 pixels.

# By default everything goes to workspace 2

# Workspace specific rules

# Kitty on 1
windowrule {
  name=kitty-on-workspace-1
  match:initial_class = kitty
  workspace = 1
  no_blur = on
  opacity = 0.95 0.8 0.9
}

# Firefox on 2
windowrule {
  name=firefox-on-workspace-2
  match:initial_class = firefox
  workspace = 2
}

# Zen on 2
windowrule {
  name=zen-on-workspace-2
  match:initial_class = zen
  workspace = 2
}

# Whatsapp and Telegram on 5
windowrule {
  name=whatsapp-on-workspace-5
  match:initial_class = chrome-web.whatsapp.com__-Default
  workspace = 5
}
windowrule {
  name=telegram-on-workspace-5
  match:initial_class = org.telegram.desktop
  workspace = 5
}

# # Steam on 4
# windowrule {
